name: generate all palette previews

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: github-light
        uses: RS-SaJiD/snake@main
        with:
          github_user_name: ${{ github.repository_owner }}
          palette: github-light
          outputs: dist/github-light.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: github-dark
        uses: RS-SaJiD/snake@main
        with:
          github_user_name: ${{ github.repository_owner }}
          palette: github-dark
          outputs: dist/github-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: gitlab-light
