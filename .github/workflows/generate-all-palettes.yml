name: generate all palette gifs

on:
  schedule:
    - cron: "0 */24 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: generate snake gifs (all palettes, light + dark)
        uses: RS-SaJiD/snake@main
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-light.gif?palette=github-light
            dist/github-dark.gif?palette=github-dark
            dist/gitlab-light.gif?palette=gitlab-light
            dist/gitlab-dark.gif?palette=gitlab-dark
            dist/forgejo-light.gif?palette=forgejo-light
            dist/forgejo-dark.gif?palette=forgejo-dark
            dist/codeberg-light.gif?palette=codeberg-light
            dist/codeberg-dark.gif?palette=codeberg-dark
            dist/red-github-light.gif?palette=red-github-light
            dist/red-github-dark.gif?palette=red-github-dark
            dist/halloween-light.gif?palette=halloween-light
            dist/halloween-dark.gif?palette=halloween-dark
            dist/winter-light.gif?palette=winter-light
            dist/winter-dark.gif?palette=winter-dark
            dist/one-dark-pro.gif?palette=one-dark-pro
            dist/synthwave.gif?palette=synthwave
            dist/dracula.gif?palette=dracula
            dist/monokai.gif?palette=monokai
            dist/nord.gif?palette=nord
            dist/tokyo-night.gif?palette=tokyo-night
            dist/catppuccin.gif?palette=catppuccin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: snake-assets
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
