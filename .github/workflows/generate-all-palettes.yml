name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  
  workflow_dispatch:
  
  push:
    branches:
    - main
    

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: RS-SaJiD/snake@main
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=winter-dark
            dist/github-contribution-grid-snake.svg?palette=halloween-dark
            dist/github-contribution-grid-snake.svg?palette=github-dark-red
            dist/github-contribution-grid-snake.svg?palette=synthwave
            dist/github-contribution-grid-snake.svg?palette=dracula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: snake-assets
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
